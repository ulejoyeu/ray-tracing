<main>
  <h1>Ray tracing image generator</h1>
  <form class="form">
    <div class="form-group">
      <label for="obs-screen">Obs. Screen</label>
      <textarea pTextarea name="obs-screen" id="obs-screen" cols="100" rows="10" [(ngModel)]="obsScreen"></textarea>
    </div>
    <div class="form-group">
      <label for="scene">Scene</label>
      <textarea pTextarea name="scene" id="scene" cols="100" rows="10" [(ngModel)]="scene"></textarea>
    </div>
    <div class="form-group">
      <label for="scale">Scale</label>
      <p-input-number name="scale" id="scale" [(ngModel)]="scale" [min]="1" [max]="10"/>
    </div>
    <div class="form-group-line">
      <div class="form-group-line-element">
        <label for="white">White</label>
        <p-toggle-switch name="white" id="white" [(ngModel)]="white" />
      </div>
      <div class="form-group-line-element">
        <label for="sign">Signature</label>
        <p-toggle-switch name="sign" id="sign" [(ngModel)]="sign" />
      </div>
    </div>
    <p-button class="submit-button" type="submit" label="Generate image" (onClick)="generateImage()" />
  </form>

  @if (isGeneratingImage()) {
    <p>Generating image...</p>
  }

  <canvas #canvas id="canvas" [width]="canvasWidth" [height]="canvasHeight">
  </canvas>
</main>
